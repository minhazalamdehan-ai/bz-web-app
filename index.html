<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaman Agro Fisheries Ltd. - Sales Management</title>
    <style>
        /* সিএসএস ডিজাইন */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }
        header {
            background-color: #70c1cf;
            padding: 20px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            border-radius: 5px;
            margin-bottom: 20px;
            color: #000;
        }
        .top-section {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 30px;
        }
        .input-form {
            flex: 1.5;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: #fafafa;
        }
        .input-group {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 5px;
            color: #555;
        }
        input, select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            outline: none;
        }
        input:focus { border-color: #70c1cf; }
        .btn-container {
            grid-column: span 2;
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            background-color: #e0e0e0;
            transition: 0.3s;
        }
        button:hover { background-color: #d0d0d0; }
        .update-btn { background-color: #70c1cf; color: white; }
        .update-btn:hover { background-color: #5bb0bd; }

        /* ডান পাশের টোটাল সেল বক্স */
        .summary-panel {
            flex: 0.8;
            background-color: #f9e1a1;
            padding: 25px;
            border-radius: 8px;
            border: 1px solid #d4af37;
            text-align: center;
        }
        .summary-header {
            font-weight: bold;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-size: 22px;
        }
        .search-box {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #999;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .summary-result {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: rgba(255,255,255,0.5);
            padding: 15px;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
        }

        /* টেবিল ডিজাইন */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th {
            background-color: #d1ecf1;
            border: 1px solid #aaa;
            padding: 12px;
            text-align: left;
        }
        td {
            border: 1px solid #ddd;
            padding: 10px;
        }
        tr:nth-child(even) { background-color: #f9f9f9; }
    </style>
</head>
<body>

<div class="container">
    <header>Zaman Agro Fisheries Ltd.</header>

    <div class="top-section">
        <div class="input-form">
            <div class="input-group">
                <label>DATE</label>
                <input type="date" id="date">
            </div>
            <div class="input-group">
                <label>ITEM</label>
                <input type="text" id="item" placeholder="যেমন: Spinach">
            </div>
            <div class="input-group">
                <label>QUANTITY</label>
                <input type="number" id="quantity" step="0.01">
            </div>
            <div class="input-group">
                <label>UNIT</label>
                <select id="unit">
                    <option value="Bunches">Bunches</option>
                    <option value="Kg">Kg</option>
                </select>
            </div>
            <div class="input-group">
                <label>UNIT PRICE (BDT)</label>
                <input type="number" id="price">
            </div>
            <div class="input-group">
                <label>LOCATION</label>
                <input type="text" id="location" placeholder="যেমন: 9th Floor Dining">
            </div>
            <div class="btn-container">
                <button class="update-btn" onclick="addEntry()">UPDATE LIST</button>
                <button onclick="clearInputs()">CLEAR</button>
            </div>
        </div>

        <div class="summary-panel">
            <div class="summary-header">Total Sell</div>
            <label style="display:block; margin-bottom:10px;">আইটেম এর নাম লিখে সার্চ দিন</label>
            <input type="text" id="summarySearch" class="search-box" placeholder="Item Name..." oninput="updateSummary()">
            <div class="summary-result" id="resultBox">
                <span id="sumItemName" style="color:#d32f2f;">ITEM</span>
                <span id="sumTotalValue" style="color:#2e7d32;">0 BDT</span>
                <span id="sumTotalQty" style="color:#1976d2;">0</span>
            </div>
        </div>
    </div>

    <table id="recordsTable">
        <thead>
            <tr>
                <th>DATE</th>
                <th>ITEM</th>
                <th>QUANTITY</th>
                <th>UNIT</th>
                <th>UNIT PRICE</th>
                <th>LOCATION</th>
                <th>TOTAL</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>
</div>

<script>
    // ডেটা স্টোর করার জন্য অ্যারে
    let entries = [];

    // নতুন ডেটা যোগ করার ফাংশন
    function addEntry() {
        const date = document.getElementById('date').value;
        const item = document.getElementById('item').value;
        const quantity = parseFloat(document.getElementById('quantity').value) || 0;
        const unit = document.getElementById('unit').value;
        const price = parseFloat(document.getElementById('price').value) || 0;
        const location = document.getElementById('location').value;
        const total = quantity * price;

        if(!date || !item) {
            alert("দয়া করে তারিখ এবং আইটেম এর নাম দিন।");
            return;
        }

        const newEntry = { date, item, quantity, unit, price, location, total };
        entries.push(newEntry);
        
        renderTable();
        updateSummary(); // লিস্ট আপডেট হলে সামারিও চেক করবে
        clearInputs();
    }

    // টেবিল দেখানোর ফাংশন
    function renderTable() {
        const tbody = document.querySelector("#recordsTable tbody");
        tbody.innerHTML = "";
        entries.forEach(entry => {
            const row = `<tr>
                <td>${entry.date}</td>
                <td>${entry.item}</td>
                <td>${entry.quantity}</td>
                <td>${entry.unit}</td>
                <td>${entry.price} BDT</td>
                <td>${entry.location}</td>
                <td>${entry.total} BDT</td>
            </tr>`;
            tbody.innerHTML += row;
        });
    }

    // ডান পাশের টোটাল সেল ক্যালকুলেশন ফাংশন
    function updateSummary() {
        const searchText = document.getElementById('summarySearch').value.toLowerCase();
        const sumItemName = document.getElementById('sumItemName');
        const sumTotalValue = document.getElementById('sumTotalValue');
        const sumTotalQty = document.getElementById('sumTotalQty');

        if(!searchText) {
            sumItemName.innerText = "ITEM";
            sumTotalValue.innerText = "0 BDT";
            sumTotalQty.innerText = "0";
            return;
        }

        let filteredTotal = 0;
        let filteredQty = 0;
        let found = false;

        entries.forEach(entry => {
            if(entry.item.toLowerCase().includes(searchText)) {
                filteredTotal += entry.total;
                filteredQty += entry.quantity;
                found = true;
            }
        });

        if(found) {
            sumItemName.innerText = searchText.toUpperCase();
            sumTotalValue.innerText = filteredTotal + " BDT";
            sumTotalQty.innerText = filteredQty;
        } else {
            sumItemName.innerText = "NOT FOUND";
            sumTotalValue.innerText = "0 BDT";
            sumTotalQty.innerText = "0";
        }
    }

    // ইনপুট বক্স খালি করার ফাংশন
    function clearInputs() {
        document.getElementById('item').value = '';
        document.getElementById('quantity').value = '';
        document.getElementById('price').value = '';
        document.getElementById('location').value = '';
    }
</script>

</body>
</html>
